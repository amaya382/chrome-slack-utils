<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      padding: 12px 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1d1c1d;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 700;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .setting-label {
      flex: 1;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background-color: #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background-color: #007a5a;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(16px);
    }
  </style>
</head>
<body>
  <h3>Slack Utils</h3>
  <div class="setting-row">
    <span class="setting-label">Send preview</span>
    <label class="toggle">
      <input type="checkbox" id="sendPreview">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
